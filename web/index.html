<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c1210" />
    <!-- seo:start (server replaces this block per route) -->
    <title>Ledgerline — Stock metrics, valuation history &amp; options analytics</title>
    <meta
      name="description"
      content="Free historical quant metrics for US stocks and ETFs: Sharpe, drawdown, beta, SEC EDGAR fundamentals, valuation history, options IV, and earnings analytics."
    />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ledgerline" />
    <meta
      property="og:title"
      content="Ledgerline — Stock metrics, valuation history &amp; options analytics"
    />
    <meta
      property="og:description"
      content="Free historical quant metrics for US stocks and ETFs: Sharpe, drawdown, beta, SEC EDGAR fundamentals, valuation history, options IV, and earnings analytics."
    />
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="Ledgerline — Stock metrics, valuation history &amp; options analytics"
    />
    <meta
      name="twitter:description"
      content="Free historical quant metrics for US stocks and ETFs: Sharpe, drawdown, beta, SEC EDGAR fundamentals, valuation history, options IV, and earnings analytics."
    />
    <!-- seo:end -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("ledgerline-theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
            document.documentElement.style.colorScheme = t;
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Ledgerline",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "description": "Historical quant metrics for US stocks and ETFs: Sharpe, drawdown, beta, SEC EDGAR fundamentals, valuation history, options IV, and earnings analytics.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
